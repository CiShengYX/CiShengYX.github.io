<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>此生已陷 - 内容解密工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1025;--card:#251535;--accent:#ff6b9d;--accent2:#c084fc;--accent3:#67e8f9;
  --text:#f0e6ff;--text-dim:#9b8bb4;--success:#34d399;--error:#fb7185;--border:#3d2a54;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 20% 20%,rgba(255,107,157,.08) 0%,transparent 40%),
  radial-gradient(circle at 80% 80%,rgba(192,132,252,.08) 0%,transparent 40%),
  radial-gradient(circle at 50% 50%,rgba(103,232,249,.05) 0%,transparent 50%);
  z-index:0;animation:bgFloat 20s ease-in-out infinite}
@keyframes bgFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(-2%,1%)}66%{transform:translate(1%,-1%)}}
.container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:30px 20px}
.author-section{text-align:center;padding:40px 20px 30px}
.avatar-wrapper{width:100px;height:100px;margin:0 auto 16px;border-radius:50%;overflow:hidden;
  border:3px solid var(--accent);box-shadow:0 0 20px rgba(255,107,157,.3),0 0 40px rgba(255,107,157,.1);
  animation:avatarGlow 3s ease-in-out infinite}
.avatar-wrapper img{width:100%;height:100%;object-fit:cover}
@keyframes avatarGlow{0%,100%{box-shadow:0 0 20px rgba(255,107,157,.3)}50%{box-shadow:0 0 25px rgba(192,132,252,.4)}}
.author-name{font-size:24px;font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.bilibili-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;
  background:linear-gradient(135deg,#fb7299,#fc4c7a);color:#fff;text-decoration:none;
  border-radius:20px;font-size:14px;font-weight:500;transition:all .3s;box-shadow:0 4px 15px rgba(251,114,153,.3)}
.bilibili-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(251,114,153,.5)}
.bilibili-btn svg{width:18px;height:18px}
.title-section{text-align:center;margin:30px 0}
.title-section h1{font-size:28px;font-weight:900;position:relative;display:inline-block}
.title-section h1::after{content:'';position:absolute;bottom:-4px;left:10%;width:80%;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));border-radius:2px}
.title-section p{color:var(--text-dim);font-size:14px;margin-top:12px}
.drop-zone{border:2px dashed var(--border);border-radius:20px;padding:50px 30px;text-align:center;
  transition:all .3s;background:rgba(37,21,53,.6);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.drop-zone::before{content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,107,157,.05),rgba(192,132,252,.05));opacity:0;transition:opacity .3s}
.drop-zone:hover::before,.drop-zone.dragover::before{opacity:1}
.drop-zone.dragover{border-color:var(--accent);transform:scale(1.01);box-shadow:0 0 30px rgba(255,107,157,.2)}
.drop-icon{font-size:48px;margin-bottom:16px;display:block;animation:iconBounce 2s ease-in-out infinite}
@keyframes iconBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.drop-text{font-size:16px;font-weight:500;color:var(--text);margin-bottom:8px}
.drop-hint{font-size:13px;color:var(--text-dim)}
.file-input{display:none}
.btn-row{display:flex;gap:12px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.btn-action{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:2px solid var(--border);
  border-radius:14px;background:rgba(37,21,53,.8);color:var(--text);font-size:14px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:all .3s}
.btn-action:hover{border-color:var(--accent);background:rgba(255,107,157,.1);transform:translateY(-1px)}
.btn-action svg{width:16px;height:16px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);z-index:100;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px;width:90%;max-width:400px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modalIn .3s ease-out}
@keyframes modalIn{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal h3{font-size:18px;margin-bottom:20px;color:var(--accent)}
.modal input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;background:var(--bg);
  color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color .3s}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:12px;margin-top:20px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
.btn-confirm{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-confirm:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(255,107,157,.4)}
.btn-cancel{background:var(--border);color:var(--text-dim)}
.btn-cancel:hover{background:#4a3660}
.results{margin-top:24px}
.result-item{background:rgba(37,21,53,.8);border:1px solid var(--border);border-radius:14px;padding:16px 20px;
  margin-bottom:12px;display:flex;align-items:center;gap:14px;animation:resultIn .4s ease-out}
@keyframes resultIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.result-icon{font-size:28px;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-status{font-size:12px;margin-top:4px}
.result-status.success{color:var(--success)}.result-status.error{color:var(--error)}.result-status.loading{color:var(--accent3)}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s;width:0%}
.stats-bar{display:none;margin-top:16px;padding:12px 20px;background:rgba(37,21,53,.8);border:1px solid var(--border);
  border-radius:14px;text-align:center;font-size:13px;color:var(--text-dim)}
.stats-bar.active{display:block}
.stats-bar span{color:var(--accent);font-weight:700}
.footer{text-align:center;margin-top:50px;padding:20px;color:var(--text-dim);font-size:12px;border-top:1px solid var(--border)}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;opacity:0}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--max-o)}}
@media(max-width:600px){.container{padding:20px 14px}.title-section h1{font-size:22px}.drop-zone{padding:35px 20px}.author-name{font-size:20px}}
</style>

  dropZone.classList.remove('dragover');
  clearTimeout(dropZone._leaveTimer);

  var items=e.dataTransfer.items;
  var droppedFiles=e.dataTransfer.files;
  var hasDirectory=false;

  // Detect if any dropped item is a directory
  if(items&&items.length>0){
    for(var i=0;i<items.length;i++){
      try{
        var entry=items[i].webkitGetAsEntry?items[i].webkitGetAsEntry():null;
        if(entry&&entry.isDirectory){hasDirectory=true;break;}
      }catch(ex){}
    }
  }

  if(hasDirectory){
    // Folder: use File System Access API (dataTransfer.files doesn't include folder contents on Windows)
    var handles=[];
    if(items&&items.length>0){
      for(var i=0;i<items.length;i++){
        try{
          if(items[i].getAsFileSystemHandle){
            handles.push(items[i].getAsFileSystemHandle());
          }
        }catch(ex){}
      }
    }
    if(handles.length>0){
      Promise.all(handles).then(function(handles){
        var collected=[];
        var promises=handles.map(function(h){return collectFromHandle(h,collected);});
        Promise.all(promises).then(function(){
          if(collected.length>0)processFiles(collected);
          else addResult('','❌','文件夹中没有找到有效文件','error');
        });
      });
    }else if(window.showDirectoryPicker){
      showDirectoryPicker().then(function(dirHandle){
        return collectFromHandle(dirHandle,[]);
      }).then(function(files){
        if(files.length>0)processFiles(files);
        else addResult('','❌','选择的文件夹中没有找到有效文件','error');
      }).catch(function(err){
        if(err.name!=='AbortError')addResult('','❌','打开文件夹失败','error');
      });
    }else{
      addResult('','❌','当前浏览器不支持文件夹拖拽，请点击"选择文件夹"按钮','error');
    }
  }else{
    // Single or multiple files: use dataTransfer.files directly
    if(droppedFiles&&droppedFiles.length>0){
      var files=[];
      for(var i=0;i<droppedFiles.length;i++)files.push(droppedFiles[i]);
      processFiles(files);
    }else{
      addResult('','❌','未检测到有效内容','error');
    }
  }
},false);

// Button clicks
// ============================
document.getElementById('btnFiles').addEventListener('click',function(e){
  e.stopPropagation();
  fileInput.click();
});

document.getElementById('btnFolder').addEventListener('click',function(e){
  e.stopPropagation();
  folderInput.value='';
  folderInput.click();

fileInput.addEventListener('change',function(){
  var files=Array.from(fileInput.files);

  if(files.length>0)processFiles(files);
  folderInput.value='';
});

// ============================
// Collect files from FileSystemHandle (File System Access API)
// ============================
function collectFromHandle(handle,files){
  if(handle.kind==='file'){
    return handle.getFile().then(function(f){
      if(f)files.push(f);
    });
  }else if(handle.kind==='directory'){
    var promises=[];
    var iter=handle.values();
    function next(){
      return iter.next().then(function(r){
        if(r.done)return;
        promises.push(collectFromHandle(r.value,files));
        return next();
      });
    }
    return next().then(function(){return Promise.all(promises);});
  }
  return Promise.resolve();
}

// ============================
// Collect files from DataTransferItemList (folder support)
// ============================
function collectFromEntries(items){
  var files=[];
  var entries=[];
  for(var i=0;i<items.length;i++){
    var entry=items[i].webkitGetAsEntry();
    if(entry){entries.push(entry);}
    else{var f=items[i].getAsFile();if(f)files.push(f);}
  }
  var promises=entries.map(function(entry){return traverseEntry(entry,files);});
  return Promise.all(promises).then(function(){return files;});
}

function traverseEntry(entry,files){
  return new Promise(function(resolve){
    if(entry.isFile){
      entry.file(function(f){
        if(f){
          files.push(f);
          console.log("[traverse] file:",f.name,"size:",f.size);
        }else{
          console.log("[traverse] file entry but no file object:",entry.fullPath);
        }
        resolve();
      },function(err){
        console.error("[traverse] file error:",entry.fullPath,err);
        resolve();
      });
    }else if(entry.isDirectory){
      console.log("[traverse] dir:",entry.fullPath||entry.name);
      var reader=entry.createReader();
      readAllEntries(reader,function(childEntries){
        console.log("[traverse] dir "+(entry.fullPath||entry.name)+" has "+childEntries.length+" children");
        if(childEntries.length===0){resolve();return;}
        var childPromises=childEntries.map(function(e){return traverseEntry(e,files);});
        Promise.all(childPromises).then(function(){
          console.log("[traverse] dir "+(entry.fullPath||entry.name)+" done, files so far: "+files.length);
          resolve();
        });
      },function(err){
        console.error("[traverse] readAllEntries error:",err);
        resolve();
      });
    }else{
      console.log("[traverse] unknown type:",entry.name);
      resolve();
    }
  });
}

function readAllEntries(reader,callback,errCallback){
  var allEntries=[];
  var firstCall=true;
  function readBatch(){
    reader.readEntries(function(entries){
      if(!entries||entries.length===0){
        // Chrome bug: first call may return empty even when dir has files
        if(firstCall){
          firstCall=false;
          console.log("[readAllEntries] first batch empty, retrying...");
          setTimeout(readBatch,100);
          return;
        }
        console.log("[readAllEntries] done, total="+allEntries.length);
        callback(allEntries);return;
      }
      firstCall=false;
      allEntries=allEntries.concat(Array.from(entries));
      console.log("[readAllEntries] batch="+entries.length+" total="+allEntries.length);
      setTimeout(readBatch,0);
    },function(err){
      console.error("[readAllEntries] error:",err);
      if(errCallback)errCallback(err);
      else callback(allEntries);
    });
  }
  readBatch();
}

// ============================
// Process
// ============================
var pendingFiles=[];
var currentPassword=null;
var decryptedResults=[];
var totalCount=0,doneCount=0;

function processFiles(files){
  var fileDataList=[];
  var loaded=0;
  if(files.length===0)return;

  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(){
      var data=new Uint8Array(reader.result);
      var parsed=parseHeader(data);
      if(parsed)fileDataList.push({file:file,data:data,parsed:parsed});
      loaded++;
      if(loaded===files.length){
        if(fileDataList.length===0){addResult('','❌','未找到有效的加密文件','error');return;}
        totalCount=fileDataList.length;doneCount=0;
        statsBar.classList.add('active');
        statsTotal.textContent=totalCount;statsDone.textContent='0';
        var needsPassword=fileDataList.some(function(f){return f.parsed.hasPassword;});
        if(needsPassword&&currentPassword===null){
          pendingFiles=fileDataList;showPasswordModal();return;
        }
        decryptAll(fileDataList,currentPassword||'');
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function decryptAll(fileDataList,password){
  decryptedResults=[];
  var useZip=fileDataList.length>=ZIP_THRESHOLD;
  var idx=0;
  function next(){
    if(idx>=fileDataList.length){
      if(useZip&&decryptedResults.length>0)downloadAsZip(decryptedResults);
      currentPassword=null;
      return;
    }
    var item=fileDataList[idx];idx++;
    decryptFile(item,password,!useZip).then(function(result){
      if(result)decryptedResults.push(result);
      doneCount++;statsDone.textContent=doneCount;
      next();
    });
  }
  next();
}

// ============================
// PNG parsing
// ============================
function findIEND(data){
  for(var i=8;i<data.length-12;i++){
    if(data[i+4]===0x49&&data[i+5]===0x45&&data[i+6]===0x4e&&data[i+7]===0x44){
      var len=(data[i]<<24)|(data[i+1]<<16)|(data[i+2]<<8)|data[i+3];
      return i+12+len;
    }
  }
  return -1;
}

function parseHeader(data){
  var iendPos=findIEND(data);
  if(iendPos<0||iendPos>=data.length)return null;
  var p=data.slice(iendPos);
  if(p.length<57)return null;
  for(var i=0;i<8;i++){if(p[i]!==MAGIC[i])return null;}
  var contentType=p[9],hasPassword=p[10]===1;
  var salt=p.slice(11,27),iv=p.slice(27,39),tag=p.slice(39,55);
  var filenameLen=(p[55]<<8)|p[56];
  var filename=new TextDecoder().decode(p.slice(57,57+filenameLen));
  var dOff=57+filenameLen;
  var dv=new DataView(p.buffer,p.byteOffset+dOff,8);
  var dataLen=Number(dv.getBigUint64(0));
  var ciphertext=p.slice(dOff+8,dOff+8+dataLen);
  return{contentType:contentType,hasPassword:hasPassword,salt:salt,iv:iv,tag:tag,filename:filename,ciphertext:ciphertext};
}

// ============================
// AES-256-GCM
// ============================
function deriveKey(password,salt){
  var enc=new TextEncoder();
  return crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']).then(function(km){
    return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  });
}

function aesDecrypt(key,iv,ciphertext,tag){
  var combined=new Uint8Array(ciphertext.length+tag.length);
  combined.set(ciphertext);combined.set(tag,ciphertext.length);
  return crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,combined).then(function(buf){return new Uint8Array(buf);});
}

// ============================
// Decrypt
// ============================
function decryptFile(item,password,autoDownload){
  var file=item.file,parsed=item.parsed;
  var typeLabel=CONTENT_TYPES[parsed.contentType]||'未知';
  var emoji=CONTENT_EMOJI[parsed.contentType]||'📄';
  var el=addResult(file.name,emoji,'正在解密 '+typeLabel+'...','loading',true);
  var pwd=parsed.hasPassword?password:'CSYX_DEFAULT_KEY';

  return deriveKey(pwd,parsed.salt).then(function(key){
    return aesDecrypt(key,parsed.iv,parsed.ciphertext,parsed.tag);
  }).then(function(decrypted){
    updateResult(el,typeLabel+' 解密成功！','success',100);
    var filename=parsed.filename||('decrypted'+(CONTENT_EXT[parsed.contentType]||'.bin'));
    var mime=CONTENT_MIME[parsed.contentType]||'application/octet-stream';
    if(autoDownload)downloadBlob(decrypted,filename,mime);
    return{data:decrypted,filename:filename,mime:mime};
  }).catch(function(err){
    var msg='解密失败';
    if(err.name==='OperationError')msg=parsed.hasPassword?'密码错误或文件已损坏':'文件已损坏';
    updateResult(el,msg,'error',0);
    return null;
  });
}

// ============================
// Download
// ============================
function downloadBlob(data,filename,mime){
  var blob=new Blob([data],{type:mime});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

function downloadAsZip(results){
  var statusEl=addResult('批量下载','📦','正在打包 '+results.length+' 个文件为 ZIP...','loading',true);
  var zip=new JSZip();
  var nameCount={};
  results.forEach(function(r){
    var name=r.filename;
    if(nameCount[name]){nameCount[name]++;name=name.replace(/(\.[^.]+)$/,'_'+nameCount[name]+'$1');}
    else{nameCount[name]=1;}
    zip.file(name,r.data);
  });
  zip.generateAsync({type:'blob'}).then(function(blob){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='decrypted_files.zip';
    document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    updateResult(statusEl,'ZIP 打包完成，已开始下载 ✓','success',100);
  }).catch(function(err){
    updateResult(statusEl,'ZIP 打包失败: '+err.message,'error',0);
  });
}

// ============================
// UI
// ============================
function addResult(name,emoji,status,cls,progress){
  var el=document.createElement('div');el.className='result-item';
  el.innerHTML='<span class="result-icon">'+emoji+'</span><div class="result-info"><div class="result-name">'+
    escapeHtml(name)+'</div><div class="result-status '+cls+'">'+status+'</div>'+
    (progress?'<div class="progress-bar"><div class="progress-fill"></div></div>':'')+'</div>';
  resultsDiv.prepend(el);return el;
}
function updateResult(el,status,cls,prog){
  var s=el.querySelector('.result-status');s.textContent=status;s.className='result-status '+cls;
  var f=el.querySelector('.progress-fill');if(f&&prog!==undefined)f.style.width=prog+'%';
}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ============================
// Password Modal
// ============================
function showPasswordModal(){modal.classList.add('active');pwdInput.value='';setTimeout(function(){pwdInput.focus();},100);}
function hidePasswordModal(){modal.classList.remove('active');pwdInput.value='';}

document.getElementById('btnConfirm').addEventListener('click',function(){
  var pwd=pwdInput.value;hidePasswordModal();
  currentPassword=pwd;var files=pendingFiles;pendingFiles=[];
  decryptAll(files,pwd);
});
document.getElementById('btnCancel').addEventListener('click',function(){
  hidePasswordModal();pendingFiles=[];currentPassword=null;
});
pwdInput.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btnConfirm').click();});
modal.addEventListener('click',function(e){if(e.target===modal)document.getElementById('btnCancel').click();});
</script>
